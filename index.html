<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI教练 - 一念智能</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #a5b4fc;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --shadow: 0 4px 24px rgba(99, 102, 241, 0.15);
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }
    
    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 28px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: pulse 4s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.3; }
    }
    
    header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      position: relative;
    }
    
    header p {
      font-size: 13px;
      opacity: 0.9;
      position: relative;
    }
    
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      margin-top: 10px;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-bottom-right-radius: 6px;
    }
    
    .message.ai {
      align-self: flex-start;
      background: var(--card);
      color: var(--text);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow);
    }
    
    .message.ai .coach-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .input-area {
      padding: 16px 20px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    
    .input-area input:focus {
      border-color: var(--primary);
    }
    
    .input-area button {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .input-area button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }
    
    .input-area button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Welcome Screen */
    .welcome {
      text-align: center;
      padding: 50px 30px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .welcome-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 28px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .welcome h2 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }
    
    .welcome p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    
    .start-btn {
      padding: 16px 48px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
      transition: all 0.3s;
      font-family: inherit;
    }
    
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
    }
    
    /* Progress Bar */
    .progress-container {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    
    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .progress-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .progress-count {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
    }
    
    .progress-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    
    /* Options */
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    
    .option-btn {
      padding: 10px 16px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .option-btn:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }
    
    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 12px 16px;
    }
    
    .loading-dots {
      display: flex;
      gap: 4px;
    }
    
    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Route Card */
    .route-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
      border: 2px solid var(--primary-light);
      border-radius: 16px;
      padding: 20px;
      margin-top: 12px;
    }
    
    .route-card h3 {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 8px;
    }
    
    .route-card p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }
    
    .route-meta {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .route-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 AI教练</h1>
      <p>一念智能 · 21天AI学习路线</p>
      <span class="badge">✨ AI驱动学习</span>
    </header>
    
    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-info">
        <span class="progress-label">学习能力评估</span>
        <span class="progress-count" id="progressCount">1/5</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 20%;"></div>
      </div>
    </div>
    
    <div class="chat-container" id="chatContainer">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">👨‍🏫</div>
        <h2>你好，我是小智</h2>
        <p>你的AI学习教练，帮你从零开始掌握AI<br>5个问题，找到最适合你的学习路线</p>
        <button class="start-btn" onclick="startAssessment()">开始评估</button>
      </div>
    </div>
    
    <div class="input-area" id="inputArea" style="display: none;">
      <input type="text" id="userInput" placeholder="输入选项数字或直接输入..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()" id="sendBtn">➤</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://cloud.fastgpt.cn/api/v1/chat/completions';
    const API_KEY = 'fastgpt-aP27CGFGRH0UFIg0Oao2o9bPn2QaSOTXWkFgjBqqb9wbMKckKGKPeRHuzpV4Zy';
    
    let state = 'welcome';
    let step = 0;
    let answers = {};
    let history = [];
    
    const questions = [
      { q: '你之前用过AI工具吗？（如ChatGPT、Claude等）', options: ['从来没用过', '用过一两次', '偶尔在用', '经常在用'] },
      { q: '你想用AI来做什么？', options: ['写文章、写报告', '做表格、数据分析', '出点子、头脑风暴', '写代码、自动化'] },
      { q: '你每天能投入多少时间学习AI？', options: ['10分钟以下', '10-30分钟', '30分钟-1小时', '1小时以上'] },
      { q: '你学习AI的主要目的是？', options: ['提升工作效率', '个人成长', '做副业/创业', '纯粹好奇'] },
      { q: '你觉得学习AI最大的困难是？', options: ['不知道从哪里开始', '看不懂术语', '没人教', '怕学不会'] }
    ];
    
    function startAssessment() {
      state = 'assessment';
      step = 0;
      document.getElementById('inputArea').style.display = 'flex';
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('progressContainer').style.display = 'block';
      updateProgress();
      addMessage('ai', '👋 好，让我们开始评估！\n\n' + questions[0].q + '\n\n（输入选项数字，如：1）');
    }
    
    function updateProgress() {
      const pct = ((step + 1) / questions.length) * 100;
      document.getElementById('progressCount').textContent = `${step + 1}/${questions.length}`;
      document.getElementById('progressFill').style.width = pct + '%';
    }
    
    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }
    
    function sendMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg) return;
      addMessage('user', msg);
      input.value = '';
      
      if (state === 'assessment') processAssessment(msg);
      else if (state === 'chat') chat(msg);
    }
    
    async function processAssessment(msg) {
      showLoading();
      const idx = parseInt(msg) - 1;
      if (idx >= 0 && idx < questions[step].options.length) {
        answers['q' + (step + 1)] = questions[step].options[idx];
      } else {
        answers['q' + (step + 1)] = msg;
      }
      step++;
      
      if (step < questions.length) {
        hideLoading();
        updateProgress();
        addMessage('ai', questions[step].q + '\n\n（输入选项数字，如：1）');
      } else {
        const rec = getRecommendation();
        hideLoading();
        document.getElementById('progressContainer').style.display = 'none';
        addMessage('ai', `🎉 评估完成！\n\n根据你的情况，推荐你走路线${rec.route}：\n\n<div class="route-card"><h3>📚 ${rec.name}</h3><p>${rec.reason}</p><div class="route-meta"><span>⏱️ ${rec.days}天</span><span>📅 每天${rec.time}</span></div></div>\n\n准备好了吗？我们开始第一步！`, true);
        state = 'chat';
        history.push({
          role: 'system',
          content: `你是小智，AI教练。产品：一念智能，21天AI学习路线。用户推荐路线${rec.route}。`
        });
      }
    }
    
    async function chat(msg) {
      showLoading();
      const msgs = [...history.map(h => ({ role: h.role, content: h.content }))];
      msgs.push({ role: 'user', content: msg });
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ stream: false, detail: false, messages: msgs })
        });
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '抱歉出错了...';
        history.push({ role: 'user', content: msg });
        history.push({ role: 'assistant', content: reply });
        hideLoading();
        addMessage('ai', reply, true);
      } catch (e) {
        hideLoading();
        addMessage('ai', '网络错误，请稍后重试。', true);
      }
    }
    
    function getRecommendation() {
      const q1 = answers.q1 || '';
      const q3 = answers.q3 || '';
      if (q1.includes('没用过') && (q3.includes('10分钟') || q3.includes('30分钟'))) {
        return { route: 'A', name: '从零开始', reason: '你刚入门，我们从最基础的概念讲起，每天10分钟，轻松上手。', days: 21, time: '10-20分钟' };
      }
      if (q1.includes('用过') && (q3.includes('30分钟') || q3.includes('1小时'))) {
        return { route: 'B', name: '快速上手', reason: '你有一定基础，直接教你最实用的技能，两周用到工作中。', days: 14, time: '20-40分钟' };
      }
      if (q1.includes('经常') || q1.includes('副业')) {
        return { route: 'C', name: '深度应用', reason: '你是进阶用户，我们来探索高级技巧和工具组合。', days: 21, time: '30-60分钟' };
      }
      return { route: 'A', name: '从零开始', reason: '我们从最基础的概念讲起，循序渐进。', days: 21, time: '15分钟' };
    }
    
    function addMessage(role, content, isAI = false) {
      const container = document.getElementById('chatContainer');
      const div = document.createElement('div');
      div.className = 'message ' + role;
      if (isAI && role === 'ai') {
        div.innerHTML = '<span class="coach-tag">🤖 小智</span>' + content;
      } else {
        div.textContent = content;
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function showLoading() {
      const container = document.getElementById('chatContainer');
      const div = document.createElement('div');
      div.className = 'message ai loading';
      div.id = 'loading';
      div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> AI思考中...';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      document.getElementById('sendBtn').disabled = true;
    }
    
    function hideLoading() {
      const el = document.getElementById('loading');
      if (el) el.remove();
      document.getElementById('sendBtn').disabled = false;
    }
  </script>
</body>
</html>
