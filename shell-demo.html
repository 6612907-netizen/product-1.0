<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一念智能 · 龙虾办公室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #3370FF;
      --primary-light: #E8F3FF;
      --text-primary: #1F2329;
      --text-secondary: #646A73;
      --text-muted: #8F959E;
      --bg-left: #F5F6F7;
      --bg-middle: #FFFFFF;
      --bg-right: #F0F2F5;
      --border: #DEE0E3;
      --radius-sm: 4px;
      --radius: 8px;
      --radius-full: 50%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-right);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ========== 左栏：全局导航 ========== */
    .left-nav {
      width: 64px;
      background: var(--bg-left);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
    }

    .nav-item {
      width: 48px;
      height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border-radius: var(--radius);
      cursor: pointer;
      position: relative;
      color: var(--text-secondary);
      font-size: 10px;
      transition: all 0.15s;
    }

    .nav-item:hover {
      background: rgba(0,0,0,0.05);
    }

    .nav-item.active {
      color: var(--primary);
      background: var(--primary-light);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: var(--primary);
      border-radius: 0 2px 2px 0;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-label {
      font-size: 9px;
      font-weight: 500;
    }

    .nav-bottom {
      margin-top: auto;
      padding-bottom: 8px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    /* ========== 中栏：消息列表 ========== */
    .middle-bar {
      width: 280px;
      background: var(--bg-middle);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .middle-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .middle-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .middle-actions {
      display: flex;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* 员工卡片 */
    .coach-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(0,0,0,0.03);
    }

    .chat-item:hover {
      background: rgba(0,0,0,0.02);
    }

    .chat-item.active {
      background: var(--primary-light);
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      position: relative;
    }

    .chat-avatar .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 8px;
      height: 8px;
      background: #F54A45;
      border-radius: 50%;
      border: 2px solid white;
    }

    .chat-info {
      flex: 1;
      min-width: 0;
    }

    .chat-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .chat-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .chat-tag {
      font-size: 9px;
      background: #FFF3E0;
      color: #E65100;
      padding: 1px 4px;
      border-radius: 2px;
    }

    .chat-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .chat-preview {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ========== 右栏：聊天窗口 ========== */
    .right-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-right);
    }

    /* 顶部 */
    .chat-header {
      height: 60px;
      padding: 0 20px;
      background: var(--bg-middle);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      gap: 16px;
      color: var(--text-muted);
      font-size: 16px;
    }

    /* 标签页 */
    .chat-tabs {
      padding: 0 20px;
      background: var(--bg-middle);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 20px;
    }

    .tab {
      padding: 12px 0;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      position: relative;
      transition: color 0.15s;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      color: var(--primary);
      font-weight: 500;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
      border-radius: 1px 1px 0 0;
    }

    /* 消息区 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 消息气泡 */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 75%;
    }

    .msg.user {
      flex-direction: row-reverse;
      margin-left: auto;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg.user .msg-avatar {
      background: #1F2329;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.coach .msg-bubble {
      background: white;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-bottom-left-radius: 2px;
    }

    .msg.user .msg-bubble {
      background: #E1EEFF;
      color: var(--text-primary);
      border-bottom-right-radius: 2px;
    }

    /* 输入区 */
    .input-area {
      padding: 12px 20px 16px;
      background: var(--bg-middle);
      border-top: 1px solid var(--border);
    }

    .quick-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .quick-btn {
      padding: 4px 10px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      padding: 10px 14px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      outline: none;
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .input-field:focus {
      border-color: var(--primary);
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    .tool-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-btn:hover {
      background: rgba(0,0,0,0.05);
      color: var(--text-secondary);
    }

    /* Token 状态 */
    .token-info {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    /* ========== 评估弹窗 ========== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      width: 440px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .progress-dots {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }

    .progress-dot {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
    }

    .progress-dot.done { background: var(--primary); }

    .q-text {
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .options { display: flex; flex-direction: column; gap: 6px; }

    .option {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-secondary);
    }

    .option:hover { border-color: var(--primary); background: var(--primary-light); }
    .option.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
    .modal-footer .btn { flex: 1; padding: 10px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
    .btn-back { background: var(--bg-left); color: var(--text-secondary); }
    .btn-next { background: var(--primary); color: white; }
  </style>
</head>
<body>

  <!-- 左栏：导航 -->
  <nav class="left-nav">
    <div class="nav-item active">
      <div class="nav-icon">💬</div>
      <div class="nav-label">消息</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📚</div>
      <div class="nav-label">知识库</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">🤖</div>
      <div class="nav-label">智能体</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">⚙️</div>
      <div class="nav-label">设置</div>
    </div>
    <div class="nav-bottom">
      <div class="user-avatar">我</div>
    </div>
  </nav>

  <!-- 中栏：聊天列表 -->
  <aside class="middle-bar">
    <div class="middle-header">
      <span class="middle-title">聊天</span>
      <div class="middle-actions">
        <span>🔍</span>
        <span>＋</span>
      </div>
    </div>
    <div class="coach-list">
      <!-- 只有一个员工 -->
      <div class="chat-item active" id="chatItem" onclick="showChat()">
        <div class="chat-avatar">
          🧠
          <span class="badge"></span>
        </div>
        <div class="chat-info">
          <div class="chat-name-row">
            <span class="chat-name">小智</span>
            
            <span class="chat-time">在线</span>
          </div>
          <div class="chat-preview">有什么可以帮你的？</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 右栏：聊天窗口 -->
  <section class="right-area">
    <!-- 顶部 -->
    <div class="chat-header">
      <div class="header-left">
        <div class="header-avatar">🧠</div>
        <div>
          <div class="header-title">小智</div>
          <div class="header-sub">在线</div>
        </div>
      </div>
      <div class="header-actions">
        <span>🔍</span>
        <span>⋮</span>
      </div>
    </div>

    <!-- 标签 -->
    <div class="chat-tabs">
      <div class="tab active">消息</div>
      <div class="tab">云文档</div>
      <div class="tab">文件</div>
    </div>

    <!-- 消息区 -->
    <div class="messages" id="msgArea">
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="quick-btns">
        <span class="quick-btn" onclick="insertCmd('帮我写文案')">写文案</span>
        <span class="quick-btn" onclick="insertCmd('做会议总结')">会议总结</span>
        <span class="quick-btn" onclick="insertCmd('查一下知识库')">查知识</span>
        <span class="quick-btn" onclick="insertCmd('日常工作咨询')">日常咨询</span>
      </div>
      <div class="input-row">
        <input type="text" class="input-field" id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
      <div class="toolbar">
        <button class="tool-btn" title="格式">Aa</button>
        <button class="tool-btn" title="表情">😊</button>
        <button class="tool-btn" title="提及">@</button>
        <button class="tool-btn" title="截图">🖼️</button>
        <button class="tool-btn" title="附件">📎</button>
      </div>
      <div class="token-info" id="tokenInfo"></div>
    </div>
  </section>



  <script>
    function addMsg(role, text) {
      const area = document.getElementById('msgArea');
      const avatar = role === 'coach' ? '🧠' : '👤';
      const html = `<div class="msg ${role}"><div class="msg-avatar">${avatar}</div><div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div></div>`;
      area.insertAdjacentHTML('beforeend', html);
      area.scrollTop = area.scrollHeight;
    }

    function sendMsg() {
      const input = document.getElementById('msgInput');
      const msg = input.value.trim();
      if (!msg) return;
      addMsg('user', msg);
      input.value = '';
      setTimeout(() => {
        const reply = getReply(msg);
        addMsg('coach', reply);
      }, 600);
    }

    function getReply(msg) {
      const m = msg.toLowerCase();
      if (m.includes('文案') || m.includes('写')) return '没问题！我来帮你写。你想要什么类型的文案？';
      if (m.includes('总结') || m.includes('会议')) return '好的，把会议内容发给我，我帮你整理成结构化的总结。';
      if (m.includes('知识') || m.includes('查')) return '我去查一下知识库，稍等～';
      return '明白了，说说你的具体需求？';
    }

    function insertCmd(cmd) {
      document.getElementById('msgInput').value = cmd;
      document.getElementById('msgInput').focus();
    }
  </script>
</body>
</html>
