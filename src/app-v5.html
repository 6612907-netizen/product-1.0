<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoloBrave - 产品 1.0 v5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #FFFFFF;
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* ========== 最左侧导航栏 ========== */
  .nav-bar {
    width: 60px;
    background: #F7F8FA;
    border-right: 1px solid #E5E5E5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 12px;
  }

  .nav-item {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 18px;
    color: #6B7280;
  }

  .nav-item:hover {
    background: #EBEBEB;
  }

  .nav-item.active {
    background: #FFFFFF;
    color: #3B82F6;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .nav-divider {
    width: 32px;
    height: 1px;
    background: #D1D5DB;
    margin: 4px 0;
  }

  /* ========== 左侧栏 ========== */
  .sidebar {
    width: 280px;
    background: #FFFFFF;
    border-right: 1px solid #E5E5E5;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #F0F0F0;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 24px;
    height: 24px;
    background: linear-gradient(135deg, #FF9D42 0%, #F57C00 100%);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 12px;
  }

  /* 橙色横幅按钮 */
  .office-btn {
    width: 100%;
    padding: 14px 16px;
    background: linear-gradient(135deg, #FF9D42 0%, #FFB347 100%);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    text-align: left;
    box-shadow: 0 4px 12px rgba(245, 124, 0, 0.25);
    margin-bottom: 12px;
  }

  .office-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(245, 124, 0, 0.3);
  }

  .office-btn-main {
    font-size: 14px;
    font-weight: 700;
    display: block;
    margin-bottom: 3px;
  }

  .office-btn-sub {
    font-size: 11px;
    opacity: 0.9;
    display: block;
  }

  /* 紫蓝渐变按钮 */
  .add-btn {
    width: 100%;
    padding: 12px 16px;
    background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    margin-bottom: 16px;
  }

  .add-btn-icon {
    font-size: 18px;
    font-weight: 300;
  }

  /* 搜索框 */
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #F7F8FA;
    border: 1px solid #EBEBEB;
    border-radius: 8px;
  }

  .search-box input {
    border: none;
    background: transparent;
    outline: none;
    font-size: 13px;
    color: #1A1A1A;
    width: 100%;
  }

  .search-box input::placeholder {
    color: #9CA3AF;
  }

  /* 标签切换 */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0;
    border-bottom: 1px solid #F0F0F0;
  }

  .tab {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-size: 14px;
    color: #9CA3AF;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    background: #FAFAFA;
  }

  .tab:hover {
    color: #1A1A1A;
  }

  .tab.active {
    color: #1A1A1A;
    font-weight: 600;
    background: #FFFFFF;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: #3B82F6;
  }

  /* 联系人列表 */
  .contact-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.12s;
    border-radius: 10px;
  }

  .contact-item:hover {
    background: #F7F8FA;
  }

  .contact-item.active {
    background: #E8F0FE;
  }

  .contact-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
    position: relative;
  }

  .avatar-status {
    position: absolute;
    bottom: 0px;
    right: 0px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #10B981;
    border: 2px solid #FFFFFF;
  }

  /* 莫兰迪色系头像 */
  .avatar-1 { background: #6B8DB8; }
  .avatar-2 { background: #7CB37A; }
  .avatar-3 { background: #5B7C9E; }
  .avatar-4 { background: #6B9BC7; }
  .avatar-5 { background: #8B7FB5; }
  .avatar-6 { background: #B87F9E; }

  .contact-info {
    flex: 1;
    min-width: 0;
  }

  .contact-name {
    font-size: 14px;
    font-weight: 600;
    color: #1A1A1A;
    margin-bottom: 4px;
  }

  .contact-preview {
    font-size: 12px;
    color: #9CA3AF;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ========== 中央聊天区 ========== */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #FFFFFF;
    min-width: 0;
  }

  .chat-header {
    height: 64px;
    padding: 0 24px;
    border-bottom: 1px solid #F0F0F0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-title-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-avatar-img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #F5D5C3 0%, #E8B4A0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .chat-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-name {
    font-size: 15px;
    font-weight: 600;
    color: #1A1A1A;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .online-dot {
    width: 8px;
    height: 8px;
    background: #10B981;
    border-radius: 50%;
  }

  .chat-subtitle {
    font-size: 12px;
    color: #9CA3AF;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .header-action-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #6B7280;
    font-size: 18px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .header-action-btn:hover {
    background: #F3F4F6;
    color: #1A1A1A;
  }

  /* 消息区 */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    background: #FFFFFF;
  }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 80%;
  }

  .msg.user {
    flex-direction: row-reverse;
    margin-left: auto;
  }

  .msg-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .msg.coach .msg-avatar { background: #F3F4F6; color: #1A1A1A; }
  .msg.user .msg-avatar { background: #000000; }

  .msg-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 100%;
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .msg-sender {
    font-size: 13px;
    color: #1A1A1A;
    font-weight: 600;
  }

  .msg-time {
    font-size: 11px;
    color: #9CA3AF;
  }

  .msg-bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 12px;
    word-break: break-word;
  }

  .msg.coach .msg-bubble {
    background: #FFFFFF;
    color: #1A1A1A;
    border-radius: 0 14px 14px 14px;
    padding-left: 0;
  }

  .msg.user .msg-bubble {
    background: #000000;
    color: #FFFFFF;
    border-radius: 14px 0 14px 14px;
  }

  /* 底部输入区 */
  .input-section {
    padding: 16px 24px 20px;
    background: #FFFFFF;
    border-top: 1px solid #F0F0F0;
  }

  /* 工具栏 */
  .toolbar {
    display: flex;
    gap: 8px;
    padding-bottom: 12px;
    margin-bottom: 12px;
  }

  .tool-item {
    font-size: 12px;
    color: #6B7280;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .tool-item:hover {
    background: #F3F4F6;
    color: #1A1A1A;
  }

  .tool-icon {
    font-size: 16px;
  }

  .input-container {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-field {
    flex: 1;
    padding: 14px 18px;
    border: none;
    background: #F7F8FA;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
    resize: none;
    min-height: 56px;
    max-height: 150px;
    font-family: inherit;
    line-height: 1.5;
    transition: background 0.2s;
  }

  .input-field:focus {
    background: #FFFFFF;
    box-shadow: 0 0 0 2px #E8F0FE;
  }

  .send-btn {
    padding: 14px 32px;
    background: #3B82F6;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: #2563EB;
  }

  /* 滚动条 */
  ::-webkit-scrollbar {
    width: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: #E5E5E5;
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="app">
    <!-- 最左侧导航栏 -->
    <div class="nav-bar">
      <div class="nav-item active" title="消息">💬</div>
      <div class="nav-item" title="项目组">📁</div>
      <div class="nav-divider"></div>
      <div class="nav-item" title="搜索">🔍</div>
      <div class="nav-item" title="添加">➕</div>
      <div class="nav-divider"></div>
      <div class="nav-item" title="视频会议">📹</div>
      <div class="nav-item" title="日历">📅</div>
      <div class="nav-item" title="云文档">📄</div>
      <div class="nav-divider"></div>
      <div class="nav-item" title="设置">⚙️</div>
    </div>

    <!-- 左侧栏 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo-text">
          <div class="logo-icon">S</div>
          SoloBrave
        </div>
        
        <!-- 橙色横幅按钮 -->
        <button class="office-btn">
          <span class="office-btn-main">🏢 进入「极野办公区」</span>
          <span class="office-btn-sub">开启高效协作</span>
        </button>

        <!-- 紫蓝渐变按钮 -->
        <button class="add-btn">
          <span class="add-btn-icon">+</span>
          新增员工
        </button>

        <!-- 搜索框 -->
        <div class="search-box">
          <span>🔍</span>
          <input type="text" placeholder="搜索">
        </div>
      </div>

      <!-- 标签切换 -->
      <div class="tabs">
        <div class="tab active">职能</div>
        <div class="tab">项目组</div>
      </div>

      <!-- 联系人列表 -->
      <div class="contact-list">
        <div class="contact-item">
          <div class="contact-avatar avatar-1">
            卢
            <div class="avatar-status"></div>
          </div>
          <div class="contact-info">
            <div class="contact-name">卢祉辛</div>
            <div class="contact-preview">好的，没问题</div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-avatar avatar-2">
            N
            <div class="avatar-status"></div>
          </div>
          <div class="contact-info">
            <div class="contact-name">Neo</div>
            <div class="contact-preview">API 规范明天发你</div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-avatar avatar-3">
            F
          </div>
          <div class="contact-info">
            <div class="contact-name">Flin</div>
            <div class="contact-preview">UI 已更新，请查看</div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-avatar avatar-4">
            I
          </div>
          <div class="contact-info">
            <div class="contact-name">Iris</div>
            <div class="contact-preview">设计稿发你了</div>
          </div>
        </div>

        <div class="contact-item">
          <div class="contact-avatar avatar-5">
            C
          </div>
          <div class="contact-info">
            <div class="contact-name">Center</div>
            <div class="contact-preview">收到</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 中央聊天区 -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="chat-title-group">
          <div class="chat-avatar-img">Grace</div>
          <div class="chat-info">
            <div class="chat-name">
              Grace
              <span class="online-dot"></span>
            </div>
            <div class="chat-subtitle">Grace Agent</div>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-action-btn">🔍</button>
          <button class="header-action-btn">📞</button>
          <button class="header-action-btn">📹</button>
          <button class="header-action-btn">➕</button>
        </div>
      </div>

      <div class="messages">
        <div class="msg coach">
          <div class="msg-avatar">Grace</div>
          <div class="msg-content">
            <div class="msg-header">
              <span class="msg-sender">Grace</span>
              <span class="msg-time">10:30</span>
            </div>
            <div class="msg-bubble">
              我来检查一下 team-skill-manager 技能的状态
            </div>
          </div>
        </div>

        <div class="msg user">
          <div class="msg-avatar">我</div>
          <div class="msg-content">
            <div class="msg-header">
              <span class="msg-sender">我</span>
              <span class="msg-time">10:31</span>
            </div>
            <div class="msg-bubble">
              好
            </div>
          </div>
        </div>

        <div class="msg coach">
          <div class="msg-avatar">Grace</div>
          <div class="msg-content">
            <div class="msg-header">
              <span class="msg-sender">Grace</span>
              <span class="msg-time">10:32</span>
            </div>
            <div class="msg-bubble">
              你好 Truman！我是 Grace 👋<br>有什么我可以帮助你的吗？
            </div>
          </div>
        </div>

        <div class="msg user">
          <div class="msg-avatar">我</div>
          <div class="msg-content">
            <div class="msg-header">
              <span class="msg-sender">我</span>
              <span class="msg-time">10:33</span>
            </div>
            <div class="msg-bubble">
              汇报下工作
            </div>
          </div>
        </div>
      </div>

      <div class="input-section">
        <!-- 工具栏 -->
        <div class="toolbar">
          <div class="tool-item">
            <span class="tool-icon">😊</span>
          </div>
          <div class="tool-item">
            <span class="tool-icon">🖼️</span>
          </div>
          <div class="tool-item">
            <span class="tool-icon">✂️</span>
          </div>
          <div class="tool-item">
            <span class="tool-icon">🎤</span>
          </div>
          <div class="tool-item">
            <span class="tool-icon">📋</span>
          </div>
        </div>

        <div class="input-container">
          <textarea class="input-field" id="chatInput" placeholder="输入消息，/ 查看快捷指令"></textarea>
          <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      const messages = document.getElementById('messages');
      const now = new Date();
      const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      
      const userHtml = `
        <div class="msg user">
          <div class="msg-avatar">我</div>
          <div class="msg-content">
            <div class="msg-header">
              <span class="msg-sender">我</span>
              <span class="msg-time">${time}</span>
            </div>
            <div class="msg-bubble">${escapeHtml(message)}</div>
          </div>
        </div>
      `;
      messages.insertAdjacentHTML('beforeend', userHtml);
      input.value = '';
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('chatInput')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    document.querySelectorAll('.contact-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
